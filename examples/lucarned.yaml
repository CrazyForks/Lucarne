# Enabled agent providers. Omit this key to enable all built-in providers.
agents:
  - claude
  - codex
  - copilot
  - gemini
  - pi

state:
  db: ~/.lucarned/state.sqlite3 # SQLite state database path.

logging:
  filter: "info,lucarne=info,lucarned=info" # File log filter for ~/.lucarned/logs.
  stderr_filter: warn # Terminal / brew stderr log filter; avoids duplicate info/debug output.
  dir: ~/.lucarned/logs # Log directory.
  max_files: 16 # Maximum number of log files to keep.

turn:
  inactivity_secs: 1800 # Fail a turn after 30min without events.
  deadline_secs: 3600 # Absolute 1h turn deadline.

session:
  idle_timeout_secs: 7200 # Close idle live sessions after 2h.

config:
  global:
    bypass: false # Globally bypass agent permission prompts.
    notifications: true # Enable notifications globally.

channels:
  telegram:
    enabled: true # Enable Telegram channel.
    token: "123456:TELEGRAM_BOT_TOKEN" # Telegram Bot Token.
    entry_chat_id: "123456789" # Entry chat id.

  wechat:
    enabled: true # Enable WeChat channel.
    credential_path: ~/.lucarned/wechat-credentials.json # WeChat login credential file.
    force_login: false # Ignore saved credentials and force QR login when true.
    context:
      ttl_secs: 7200 # Expected WeChat context lifetime.
      expiry_remind_before_secs: 300 # Remind user this many seconds before context expiry.
      expiry_reminder_template: 会话将在 {remaining_minutes} 分钟后到期，请回复以保持会话可用。 # Context expiry reminder text.
    rate_limit:
      retry_after_secs: 90 # Back off this many seconds after WeChat ret=-2 / errcode=-2.
      max_retries: 3 # Maximum retries after hitting rate limit.
      interaction_window_secs: 300 # Rolling window for proactive-send counting.
      interaction_threshold: 6 # Prompt user when proactive sends reach this count in the window; 0 disables threshold events.
      interaction_prompt: 微信主动通知快到发送限制了，请回复任意消息以刷新会话。 # Prompt sent when proactive sends approach WeChat limit.
