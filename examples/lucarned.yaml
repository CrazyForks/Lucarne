agents:
  - claude
  - codex
  - copilot
  - gemini
  - pi

state:
  db: ~/.lucarned/state.sqlite3

logging:
  filter: "info,lucarne=info,lucarned=info"
  dir: ~/.lucarned/logs
  max_files: 16

turn:
  inactivity_secs: 1800 # 30min 无事件则 turn 失败
  deadline_secs: 3600 # 1h turn 绝对上限

session:
  idle_timeout_secs: 7200 # 2h 闲置自动关闭

config:
  global:
    bypass: false
    notifications: true

channels:
  telegram:
    enabled: true
    token: "123456:TELEGRAM_BOT_TOKEN"
    entry_chat_id: "123456789"

  wechat:
    enabled: true
    credential_path: ~/.lucarned/wechat-credentials.json
    force_login: false
    context:
      ttl_secs: 7200
      expiry_remind_before_secs: 300
      expiry_reminder_template: 会话将在 {remaining_minutes} 分钟后到期，请回复以保持会话可用。
    rate_limit:
      interaction_prompt: 微信主动通知快到发送限制了，请回复任意消息以刷新会话。
